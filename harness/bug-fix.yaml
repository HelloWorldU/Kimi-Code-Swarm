# Harness Template: 修复 Bug
# 触发: 实例状态变为 error，或同一 bug 反复出现

meta:
  name: bug-fix
  version: "2.0"

# ── 必须遵守的红线 ──
must:
  - 理解根因后再动手（禁止盲修）
  - 修复后必须留痕（根因说明，形式不限）

# ── 绝对禁止的行为 ──
must-not:
  - 同一 bug 反复出现时仍不加日志定位
  - 修复后不留任何痕迹

# ── 参考建议（Agent 可自由替换或调整） ──
reference:
  - 日志工具: src/utils/logger.ts（也可直接用 console 调试用，但提交前需清理）
  - 留痕形式（优先）: docs/ 目录下的设计决策或 exec-plans/ 的执行记录
  - 留痕形式（补充）: 代码注释 / commit message / harness/bug-fix.yaml 更新
  - 诊断方法: 读取日志、复现步骤、二分法定位，Agent 自选最有效的方式
  - 验证方式: 复现场景确认修复，Agent 自选验证手段
