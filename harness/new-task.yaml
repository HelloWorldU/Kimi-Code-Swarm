# Harness Template: 新建任务（指挥官派任务）
# 触发: 指挥官通过 Dashboard 创建新 Agent 任务

meta:
  name: new-task
  version: "2.0"

# ── 必须遵守的红线 ──
must:
  - 代码改动后必须经过验证闭环才能开 PR
  - 审阅通过后方可合并到 main

# ── 绝对禁止的行为 ──
must-not:
  - 未经验证的代码合入 main
  - 跳过审阅门控直接合并

# ── 参考建议（Agent 可自由替换或调整） ──
reference:
  - 验证闭环: build → start → test → lint/analyze（Agent 可调整顺序或补充其他检查）
  - 启动方式: npm run dev（浏览器）或 cargo tauri dev（桌面），Agent 根据任务类型自选
  - 审阅要求: 至少 1 个其他 Agent 审阅通过（Review Agent 优先）
  - 纯文档/配置改动（无 src/ 代码变更）: 可跳过 build/start/test，但仍需 lint + check-docs
